name: sigrid-pullrequest
on: [pull_request]
jobs:
  sigridci:
    name: "Sigrid CI"
    if: github.repository_owner == 'Software-Improvement-Group' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: "Check out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: "Special case: We use Sigrid CI on itself, so if we want its own code to be analyzed we need a copy"
        run: "cp -r sigridci/sigridci src && cp sigridci/*.py src"
      - name: "Run Sigrid CI" 
        env:
          SIGRID_CI_TOKEN: "${{ secrets.SIGRID_CI_TOKEN }}"
        run: "./sigridci/sigridci.py --customer sig --system sigridci-client --source . --capability maintainability,osh,security"
      - name: "Save Sigrid CI results"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: "sigrid-ci-output/**"
          retention-days: 7
          if-no-files-found: ignore
      - name: "Sigrid pull request feedback"
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11.0
        if: always()
        with:
          message-id: sigrid
          message-path: sigrid-ci-output/*feedback.md
  sigridci_docker:
    name: "Sigrid CI in Docker"
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Software-Improvement-Group' && github.actor != 'dependabot[bot]'
    steps:
      - name: "Check out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Special case: We use Sigrid CI on itself, so if we want its own code to be analyzed we need a copy"
        run: "cp -r sigridci/sigridci src && cp sigridci/*.py src"
      - name: "Run Sigrid CI in Docker"
        uses: ./
        id: dockertest
        with:
          customer: "sig"
          system: "sigridci-client"
          capability: "maintainability,osh,security"
        env:
          SIGRID_CI_TOKEN: "${{ secrets.SIGRID_CI_TOKEN }}"
